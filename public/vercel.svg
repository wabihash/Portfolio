<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
	<defs>
		<linearGradient id="bg" x1="160" y1="80" x2="1440" y2="820" gradientUnits="userSpaceOnUse">
			<stop stop-color="#050B1E"/>
			<stop offset="0.52" stop-color="#0B1633"/>
			<stop offset="1" stop-color="#020617"/>
		</linearGradient>
		<linearGradient id="accent" x1="280" y1="120" x2="1380" y2="780" gradientUnits="userSpaceOnUse">
			<stop stop-color="#F97316" stop-opacity="0.95"/>
			<stop offset="0.52" stop-color="#38BDF8" stop-opacity="0.72"/>
			<stop offset="1" stop-color="#A78BFA" stop-opacity="0.82"/>
		</linearGradient>
		<filter id="shadow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse">
			<feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.45"/>
		</filter>
		<clipPath id="panelLarge">
			<rect x="86" y="198" width="540" height="520" rx="34"/>
		</clipPath>
		<clipPath id="panelTopRight">
			<rect x="682" y="198" width="392" height="246" rx="30"/>
		</clipPath>
		<clipPath id="panelBottomRight">
			<rect x="682" y="472" width="392" height="246" rx="30"/>
		</clipPath>
	</defs>

	<rect width="1600" height="900" fill="url(#bg)"/>
	<circle cx="320" cy="170" r="220" fill="#F97316" fill-opacity="0.18"/>
	<circle cx="1260" cy="220" r="260" fill="#38BDF8" fill-opacity="0.14"/>
	<circle cx="1320" cy="760" r="240" fill="#A78BFA" fill-opacity="0.16"/>
	<path d="M120 760C360 610 530 560 780 568C1050 576 1230 676 1480 544" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 18" opacity="0.45"/>

	<g filter="url(#shadow)">
		<rect x="66" y="88" width="1468" height="724" rx="42" fill="#07101F" fill-opacity="0.86" stroke="#FFFFFF" stroke-opacity="0.08"/>
		<rect x="86" y="108" width="1428" height="684" rx="34" fill="none" stroke="#FFFFFF" stroke-opacity="0.06"/>
	</g>

	<text x="136" y="180" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="-0.02em">Selected portfolio work</text>
	<text x="136" y="228" fill="#C7D2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="500">Product screenshots from Campus Hub, Amazon, and Cgram</text>

	<g filter="url(#shadow)">
		<g clip-path="url(#panelLarge)">
			<rect x="86" y="198" width="540" height="520" rx="34" fill="#0B1220"/>
			<image href="/images/Campus-hub.jpg" x="86" y="198" width="540" height="520" preserveAspectRatio="xMidYMid slice"/>
			<rect x="86" y="198" width="540" height="520" rx="34" fill="url(#accent)" opacity="0.12"/>
		</g>
		<rect x="86" y="198" width="540" height="520" rx="34" stroke="#FFFFFF" stroke-opacity="0.12"/>
	</g>

	<g filter="url(#shadow)">
		<g clip-path="url(#panelTopRight)">
			<rect x="682" y="198" width="392" height="246" rx="30" fill="#0B1220"/>
			<image href="/images/Amazon.jpg" x="682" y="198" width="392" height="246" preserveAspectRatio="xMidYMid slice"/>
			<rect x="682" y="198" width="392" height="246" rx="30" fill="#38BDF8" opacity="0.10"/>
		</g>
		<rect x="682" y="198" width="392" height="246" rx="30" stroke="#FFFFFF" stroke-opacity="0.12"/>
	</g>

	<g filter="url(#shadow)">
		<g clip-path="url(#panelBottomRight)">
			<rect x="682" y="472" width="392" height="246" rx="30" fill="#0B1220"/>
			<image href="/images/Cgram.jpg" x="682" y="472" width="392" height="246" preserveAspectRatio="xMidYMid slice"/>
			<rect x="682" y="472" width="392" height="246" rx="30" fill="#A78BFA" opacity="0.10"/>
		</g>
		<rect x="682" y="472" width="392" height="246" rx="30" stroke="#FFFFFF" stroke-opacity="0.12"/>
	</g>

	<g>
		<rect x="1100" y="198" width="338" height="520" rx="30" fill="#0B1220" fill-opacity="0.92" stroke="#FFFFFF" stroke-opacity="0.08"/>
		<text x="1140" y="274" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Portfolio stack</text>
		<text x="1140" y="332" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500">React</text>
		<text x="1140" y="378" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500">Node.js</text>
		<text x="1140" y="424" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500">Express</text>
		<text x="1140" y="470" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500">MongoDB</text>
		<text x="1140" y="516" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500">PWA</text>
		<text x="1140" y="562" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500">AI Integration</text>
		<text x="1140" y="626" fill="#F97316" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="0.08em">FEATURED WORK</text>
		<path d="M1140 648H1382" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
	</g>
</svg>